# PacketSentry 默认配置
# 网络流量异常检测系统

[collector]
# 嗅探接口（monitor 模式使用）
interface = eth0
# PCAP BPF 过滤器
bpf_filter = 
# 抓包超时（秒）
timeout = 60
# 最大包数量（0 = 无限制）
max_packets = 0

[features]
# 时间窗口大小（秒）
window_size = 5.0
# 窗口滑动步长（秒）
window_step = 2.5
# 是否启用协议深度解析
deep_protocol_analysis = true

[models.isolation_forest]
# Isolation Forest 树数量
n_estimators = 200
# 异常比例（训练时假设的异常比例）
contamination = 0.05
# 随机种子
random_state = 42
# 特征采样数
max_features = 1.0

[models.autoencoder]
# 编码层维度（逗号分隔）
hidden_dims = 32,16,8
# 学习率
learning_rate = 0.001
# 训练轮次
epochs = 100
# 批大小
batch_size = 32
# 异常阈值百分位
threshold_percentile = 95

[detector]
# 集成策略：any / majority / weighted
ensemble_strategy = weighted
# IF 权重（weighted 策略下使用）
if_weight = 0.4
# AE 权重
ae_weight = 0.6
# 告警冷却时间（秒）
alert_cooldown = 30

[visualizer]
# 刷新间隔（秒）
refresh_interval = 2
# 最大显示条目
max_display_items = 20
